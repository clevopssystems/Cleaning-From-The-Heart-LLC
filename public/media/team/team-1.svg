<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F7F6"/>
      <stop offset="100%" stop-color="#EDF4F1"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#1E7A56" fill-opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#dots)"/>
  <rect x="14" y="14" width="572" height="572" rx="14" stroke="#1E7A56" stroke-opacity="0.16" stroke-width="1.5" stroke-dasharray="7 4" fill="none"/>
  <!-- Person head -->
  <circle cx="300" cy="228" r="54" fill="#1E7A56" fill-opacity="0.12" stroke="#1E7A56" stroke-opacity="0.2" stroke-width="1.5"/>
