<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#EDF4F1"/>
      <stop offset="100%" stop-color="#F5F7F6"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#1E7A56" fill-opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#dots)"/>
  <rect x="14" y="14" width="572" height="572" rx="14" stroke="#1E7A56" stroke-opacity="0.16" stroke-width="1.5" stroke-dasharray="7 4" fill="none"/>
  <!-- Sparkle / clean result icon -->
  <circle cx="300" cy="270" r="52" fill="#1E7A56" fill-opacity="0.08" stroke="#1E7A56" stroke-opacity="0.18" stroke-width="1.5"/>
  <!-- Star/sparkle paths -->
  <line x1="300" y1="230" x2="300" y2="310" stroke="#1E7A56" stroke-opacity="0.3" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="260" y1="270" x2="340" y2="270" stroke="#1E7A56" stroke-opacity="0.3" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="272" y1="242" x2="328" y2="298" stroke="#1E7A56" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="328" y1="242" x2="272" y2="298" stroke="#1E7A56" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Labels -->
  <text x="300" y="370" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#0F3D2E" fill-opacity="0.45" text-anchor="middle" letter-spacing="2">REPLACE WITH RESULT PHOTO</text>
  <text x="300" y="393" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="500" fill="#0F3D2E" fill-opacity="0.4" text-anchor="middle">Consistent Results</text>
  <text x="300" y="414" font-family="ui-monospace,Menlo,monospace" font-size="9.5" fill="#6B7280" fill-opacity="0.7" text-anchor="middle">/public/media/team/team-4.jpg · 600×600px</text>
</svg>
